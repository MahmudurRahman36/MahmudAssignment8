server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  # System syslog
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          server: monitoring-server
          environment: production
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+ \d+ \d+:\d+:\d+) (?P<hostname>\S+) (?P<process>\w+)\[?(?P<pid>\d+)?\]?: (?P<message>.*)'
      - labels:
          process:

  # Auth logs (for failed/successful logins)
  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          server: monitoring-server
          environment: production
          __path__: /var/log/auth.log
